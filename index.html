<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0f1117; color: #e1e5ea; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; }
    .glow-green { box-shadow: 0 0 12px rgba(34,197,94,0.15); }
    .glow-red { box-shadow: 0 0 12px rgba(239,68,68,0.15); }
    .ticker-scroll { animation: scroll 40s linear infinite; }
    @keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .ticker-scroll:hover { animation-play-state: paused; }
    input:focus { outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,0.5); }
    .tab-active { background: #2563eb; color: #fff; }
    .tab-inactive { background: transparent; color: #9ca3af; }
    .tab-inactive:hover { background: #2a2d3a; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d27; }
    ::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 3px; }
    .skeleton { background: linear-gradient(90deg, #1a1d27 25%, #2a2d3a 50%, #1a1d27 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body class="min-h-screen">
  <header class="sticky top-0 z-50 border-b border-[#2a2d3a] bg-[#0f1117]/90 backdrop-blur-sm">
    <div class="max-w-[1440px] mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <svg class="w-7 h-7 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 4 5-8"/></svg>
        <span class="text-lg font-semibold tracking-tight">StockDash</span>
      </div>
      <div class="flex-1 max-w-md">
        <input id="searchInput" type="text" placeholder="종목 검색 (예: AAPL, 005930)" class="w-full bg-[#1a1d27] border border-[#2a2d3a] rounded-lg px-4 py-2 text-sm placeholder-gray-500">
      </div>
      <div class="flex items-center gap-3 text-sm text-gray-400">
        <span id="lastUpdate" class="hidden sm:inline">불러오는 중...</span>
        <button id="refreshBtn" class="p-2 rounded-lg hover:bg-[#2a2d3a] transition" title="새로고침">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.6-12.6L1 10"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="border-b border-[#2a2d3a] overflow-hidden bg-[#141620]">
    <div id="tickerBar" class="flex whitespace-nowrap ticker-scroll py-2 text-xs font-medium"></div>
  </div>

  <main class="max-w-[1440px] mx-auto px-4 py-6 space-y-6">
    <section>
      <h2 class="text-sm font-medium text-gray-400 mb-3">시장 지수</h2>
      <div id="indicesGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="card p-3"><div class="skeleton h-4 w-16 mb-2"></div><div class="skeleton h-6 w-24 mb-1"></div><div class="skeleton h-4 w-20"></div></div>
        <div class="card p-3"><div class="skeleton h-4 w-16 mb-2"></div><div class="skeleton h-6 w-24 mb-1"></div><div class="skeleton h-4 w-20"></div></div>
        <div class="card p-3"><div class="skeleton h-4 w-16 mb-2"></div><div class="skeleton h-6 w-24 mb-1"></div><div class="skeleton h-4 w-20"></div></div>
        <div class="card p-3"><div class="skeleton h-4 w-16 mb-2"></div><div class="skeleton h-6 w-24 mb-1"></div><div class="skeleton h-4 w-20"></div></div>
      </div>
    </section>

    <section>
      <div class="flex gap-2 mb-4">
        <button data-tab="watchlist" class="tab-btn tab-active px-4 py-2 rounded-lg text-sm font-medium transition">관심종목</button>
        <button data-tab="holdings" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">보유종목</button>
        <button data-tab="sector" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">섹터별</button>
      </div>
      <div id="tab-watchlist" class="tab-content">
        <div id="watchlistGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
      </div>
      <div id="tab-holdings" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div class="lg:col-span-2 card p-4">
            <h3 class="text-sm font-medium text-gray-400 mb-3">보유 현황</h3>
            <table class="w-full text-sm"><thead><tr class="text-gray-500 border-b border-[#2a2d3a]"><th class="text-left py-2 font-medium">종목</th><th class="text-right py-2 font-medium">수량</th><th class="text-right py-2 font-medium">평균단가</th><th class="text-right py-2 font-medium">현재가</th><th class="text-right py-2 font-medium">수익률</th></tr></thead><tbody id="holdingsBody"></tbody></table>
          </div>
          <div class="card p-4">
            <h3 class="text-sm font-medium text-gray-400 mb-3">자산 구성</h3>
            <canvas id="portfolioChart" height="260"></canvas>
            <div id="portfolioTotal" class="mt-4 text-center"></div>
          </div>
        </div>
      </div>
      <div id="tab-sector" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="card p-4"><h3 class="text-sm font-medium text-gray-400 mb-3">섹터별 수익률</h3><canvas id="sectorChart" height="300"></canvas></div>
          <div class="card p-4"><h3 class="text-sm font-medium text-gray-400 mb-3">섹터별 비중</h3><canvas id="sectorPieChart" height="300"></canvas></div>
        </div>
      </div>
    </section>

    <section>
      <div class="card p-4">
        <div class="flex items-center justify-between mb-3">
          <div><h3 id="chartTitle" class="font-semibold">AAPL</h3><span id="chartSubtitle" class="text-sm text-gray-400">Apple Inc.</span></div>
          <div class="flex gap-1" id="chartRangeBtns">
            <button data-range="5d" class="range-btn px-3 py-1 rounded text-xs bg-[#2a2d3a] text-gray-400 hover:bg-[#3a3d4a] transition">1W</button>
            <button data-range="1mo" class="range-btn px-3 py-1 rounded text-xs bg-blue-600 text-white transition">1M</button>
            <button data-range="3mo" class="range-btn px-3 py-1 rounded text-xs bg-[#2a2d3a] text-gray-400 hover:bg-[#3a3d4a] transition">3M</button>
            <button data-range="6mo" class="range-btn px-3 py-1 rounded text-xs bg-[#2a2d3a] text-gray-400 hover:bg-[#3a3d4a] transition">6M</button>
            <button data-range="1y" class="range-btn px-3 py-1 rounded text-xs bg-[#2a2d3a] text-gray-400 hover:bg-[#3a3d4a] transition">1Y</button>
          </div>
        </div>
        <canvas id="priceChart" height="280"></canvas>
      </div>
    </section>

    <section>
      <h2 class="text-sm font-medium text-gray-400 mb-3">주요 뉴스</h2>
      <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
    </section>
  </main>

  <script>
  // ── Config ───────────────────────────────────────────────
  const CORS_PROXY = 'https://corsproxy.io/?url=';

  const WATCHLIST = {
    AAPL:    { name:'Apple Inc.',        sector:'Technology' },
    MSFT:    { name:'Microsoft Corp.',   sector:'Technology' },
    GOOGL:   { name:'Alphabet Inc.',     sector:'Technology' },
    AMZN:    { name:'Amazon.com Inc.',   sector:'Consumer' },
    NVDA:    { name:'NVIDIA Corp.',      sector:'Technology' },
    TSLA:    { name:'Tesla Inc.',        sector:'Auto' },
    META:    { name:'Meta Platforms',    sector:'Technology' },
    JPM:     { name:'JPMorgan Chase',   sector:'Finance' },
    V:       { name:'Visa Inc.',         sector:'Finance' },
    JNJ:     { name:'Johnson & Johnson', sector:'Healthcare' },
    '005930.KS': { name:'삼성전자',       sector:'Technology' },
    '000660.KS': { name:'SK하이닉스',     sector:'Technology' },
    '035720.KQ': { name:'카카오',         sector:'Tech' },
    '051910.KS': { name:'LG화학',         sector:'Material' },
    '006400.KS': { name:'삼성SDI',        sector:'Technology' },
  };

  const INDEX_SYMBOLS = {
    KOSPI:   '^KS11',
    KOSDAQ:  '^KQ11',
    'S&P 500': '^GSPC',
    NASDAQ:  '^IXIC',
  };

  const HOLDINGS = [
    { ticker:'AAPL',        qty:10, avg:175.00 },
    { ticker:'MSFT',        qty:5,  avg:380.00 },
    { ticker:'NVDA',        qty:20, avg:95.00 },
    { ticker:'005930.KS',   qty:50, avg:78000 },
    { ticker:'JPM',         qty:8,  avg:190.00 },
  ];

  // ── State ────────────────────────────────────────────────
  let stockData = {};   // { symbol: { price, change, pct, prevClose } }
  let indexData = {};   // same
  let chartCache = {};  // { "SYMBOL:range": { labels, prices } }
  let currentTicker = 'AAPL';
  let currentRange = '1mo';

  // ── Helpers ──────────────────────────────────────────────
  const isKRW = t => t.endsWith('.KS') || t.endsWith('.KQ');
  const fmtPrice = (t, p) => isKRW(t) ? Math.round(p).toLocaleString('ko-KR') : '$' + p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmt = (n, d=2) => n.toFixed(d);

  // ── Yahoo Finance API ───────────────────────────────────
  async function fetchQuotes(symbols) {
    const url = `${CORS_PROXY}${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + symbols.join(','))}`;
    try {
      const resp = await fetch(url);
      const data = await resp.json();
      const result = {};
      if (data.quoteResponse && data.quoteResponse.result) {
        data.quoteResponse.result.forEach(q => {
          result[q.symbol] = {
            price: q.regularMarketPrice,
            change: q.regularMarketChange,
            pct: q.regularMarketChangePercent,
            prevClose: q.regularMarketPreviousClose,
            name: q.shortName || q.symbol,
          };
        });
      }
      return result;
    } catch(e) {
      console.error('Quote fetch failed:', e);
      return {};
    }
  }

  async function fetchChart(symbol, range='1mo') {
    const key = `${symbol}:${range}`;
    if (chartCache[key]) return chartCache[key];
    const interval = range === '5d' ? '1d' : range === '1mo' ? '1d' : range === '3mo' ? '1d' : range === '6mo' ? '1wk' : '1wk';
    const url = `${CORS_PROXY}${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?range=' + range + '&interval=' + interval)}`;
    try {
      const resp = await fetch(url);
      const data = await resp.json();
      const result = data.chart.result[0];
      const timestamps = result.timestamp;
      const closes = result.indicators.quote[0].close;
      const labels = timestamps.map(t => {
        const d = new Date(t * 1000);
        return `${d.getMonth()+1}/${d.getDate()}`;
      });
      // Filter out null closes
      const filtered = { labels: [], prices: [] };
      for (let i = 0; i < closes.length; i++) {
        if (closes[i] !== null) {
          filtered.labels.push(labels[i]);
          filtered.prices.push(closes[i]);
        }
      }
      chartCache[key] = filtered;
      return filtered;
    } catch(e) {
      console.error('Chart fetch failed:', e);
      return null;
    }
  }

  // ── Render ───────────────────────────────────────────────
  function renderTicker() {
    const entries = Object.entries({...indexData, ...stockData});
    if (!entries.length) return;
    const items = entries.map(([t, s]) => {
      if (!s || s.price == null) return '';
      const color = s.pct >= 0 ? 'text-green-400' : 'text-red-400';
      const arrow = s.pct >= 0 ? '▲' : '▼';
      const displayTicker = t.replace('.KS','').replace('.KQ','');
      return `<span class="inline-flex items-center gap-2 px-4"><span class="text-gray-300 font-medium">${displayTicker}</span><span class="text-gray-200">${fmtPrice(t, s.price)}</span><span class="${color}">${arrow}${fmt(Math.abs(s.pct))}%</span></span>`;
    }).join('');
    document.getElementById('tickerBar').innerHTML = items + items;
  }

  function renderIndices() {
    const html = Object.entries(INDEX_SYMBOLS).map(([name, symbol]) => {
      const s = indexData[symbol];
      if (!s || s.price == null) return `<div class="card p-3"><div class="text-xs text-gray-400 mb-1">${name}</div><div class="skeleton h-6 w-24 mb-1"></div><div class="skeleton h-4 w-20"></div></div>`;
      const up = s.pct >= 0;
      const cls = up ? 'glow-green border-green-900/40' : 'glow-red border-red-900/40';
      const nc = up ? 'text-green-400' : 'text-red-400';
      const arrow = up ? '▲' : '▼';
      return `<div class="card ${cls} p-3"><div class="text-xs text-gray-400 mb-1">${name}</div><div class="text-lg font-semibold">${s.price.toLocaleString()}</div><div class="${nc} text-sm mt-1">${arrow} ${fmt(Math.abs(s.pct))}% (${up?'+':''}${fmt(s.change)})</div></div>`;
    }).join('');
    document.getElementById('indicesGrid').innerHTML = html;
  }

  function renderWatchlist() {
    const html = Object.entries(WATCHLIST).map(([t, info]) => {
      const s = stockData[t];
      if (!s || s.price == null) {
        return `<div class="card p-3"><div class="skeleton h-4 w-12 mb-2"></div><div class="skeleton h-5 w-24 mb-1"></div><div class="skeleton h-6 w-20 mb-2"></div><div class="skeleton h-4 w-16"></div></div>`;
      }
      const up = s.pct >= 0;
      const nc = up ? 'text-green-400' : 'text-red-400';
      const badge = up ? 'bg-green-900/30 text-green-400' : 'bg-red-900/30 text-red-400';
      const arrow = up ? '▲' : '▼';
      const displayTicker = t.replace('.KS','').replace('.KQ','');
      return `<div class="card p-3 cursor-pointer hover:border-[#3a3d4a] transition stock-card" data-ticker="${t}"><div class="flex items-start justify-between mb-2"><div><div class="font-semibold text-sm">${displayTicker}</div><div class="text-xs text-gray-500">${s.name || info.name}</div></div><span class="text-[10px] px-2 py-0.5 rounded ${badge}">${info.sector}</span></div><div class="text-lg font-semibold mb-1">${fmtPrice(t, s.price)}</div><div class="flex items-center justify-between"><span class="${nc} text-sm">${arrow} ${fmt(Math.abs(s.pct))}%</span><span class="${nc} text-xs">${up?'+':''}${fmt(s.change, isKRW(t)?0:2)}</span></div></div>`;
    }).join('');
    document.getElementById('watchlistGrid').innerHTML = html;

    document.querySelectorAll('.stock-card').forEach(c => {
      c.addEventListener('click', () => {
        currentTicker = c.dataset.ticker;
        showChart();
      });
    });
  }

  function renderHoldings() {
    const tbody = document.getElementById('holdingsBody');
    let totalVal = 0, totalCost = 0;
    tbody.innerHTML = HOLDINGS.map(h => {
      const s = stockData[h.ticker];
      if (!s || s.price == null) return `<tr class="border-b border-[#2a2d3a]"><td class="py-2" colspan="5"><div class="skeleton h-4 w-full"></div></td></tr>`;
      const curVal = s.price * h.qty;
      const costVal = h.avg * h.qty;
      const pnl = ((s.price - h.avg) / h.avg * 100);
      const up = pnl >= 0;
      totalVal += curVal;
      totalCost += costVal;
      const nc = up ? 'text-green-400' : 'text-red-400';
      const displayTicker = h.ticker.replace('.KS','').replace('.KQ','');
      return `<tr class="border-b border-[#2a2d3a] hover:bg-[#1e2130] transition cursor-pointer stock-card" data-ticker="${h.ticker}"><td class="py-2"><span class="font-medium">${displayTicker}</span><br><span class="text-xs text-gray-500">${s.name || WATCHLIST[h.ticker]?.name || ''}</span></td><td class="text-right py-2">${h.qty}</td><td class="text-right py-2">${fmtPrice(h.ticker, h.avg)}</td><td class="text-right py-2">${fmtPrice(h.ticker, s.price)}</td><td class="text-right py-2 ${nc} font-medium">${up?'+':''}${fmt(pnl)}%</td></tr>`;
    }).join('');
    if (totalCost > 0) {
      const totalPnlPct = ((totalVal - totalCost) / totalCost * 100);
      document.getElementById('portfolioTotal').innerHTML = `<div class="text-xs text-gray-400">총 평가금액</div><div class="text-xl font-bold">$${totalVal.toLocaleString('en-US',{minimumFractionDigits:2})}</div><div class="text-sm ${totalPnlPct>=0?'text-green-400':'text-red-400'}">${totalPnlPct>=0?'+':''}${fmt(totalPnlPct)}%</div>`;
    }
    // Portfolio pie
    const ctx = document.getElementById('portfolioChart').getContext('2d');
    if (window._pc) window._pc.destroy();
    const colors = ['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ef4444'];
    const validHoldings = HOLDINGS.filter(h => stockData[h.ticker]?.price != null);
    if (validHoldings.length) {
      window._pc = new Chart(ctx, {type:'doughnut', data:{labels:validHoldings.map(h=>h.ticker.replace('.KS','').replace('.KQ','')), datasets:[{data:validHoldings.map(h=>stockData[h.ticker].price*h.qty), backgroundColor:colors, borderWidth:0}]}, options:{plugins:{legend:{position:'bottom',labels:{color:'#9ca3af',padding:12,font:{size:11}}}}, cutout:'65%'}});
    }
  }

  function renderSector() {
    const sectors = {};
    Object.entries(WATCHLIST).forEach(([t, info]) => {
      const s = stockData[t];
      if (!s || s.pct == null) return;
      if (!sectors[info.sector]) sectors[info.sector] = { total:0, count:0 };
      sectors[info.sector].total += s.pct;
      sectors[info.sector].count++;
    });
    const labels = Object.keys(sectors);
    if (!labels.length) return;
    const avgs = labels.map(l => sectors[l].total / sectors[l].count);
    const counts = labels.map(l => sectors[l].count);
    const barColors = avgs.map(v => v >= 0 ? '#22c55e' : '#ef4444');

    const ctx1 = document.getElementById('sectorChart').getContext('2d');
    if (window._sc) window._sc.destroy();
    window._sc = new Chart(ctx1, {type:'bar', data:{labels, datasets:[{data:avgs, backgroundColor:barColors, borderRadius:6, barPercentage:0.6}]}, options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{grid:{color:'#2a2d3a'}, ticks:{color:'#9ca3af', callback:v=>v+'%'}}, y:{grid:{display:false}, ticks:{color:'#e1e5ea', font:{size:12}}}}}});

    const ctx2 = document.getElementById('sectorPieChart').getContext('2d');
    if (window._spc) window._spc.destroy();
    const pc = ['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#ec4899'];
    window._spc = new Chart(ctx2, {type:'pie', data:{labels, datasets:[{data:counts, backgroundColor:pc.slice(0,labels.length), borderWidth:0}]}, options:{plugins:{legend:{position:'bottom', labels:{color:'#9ca3af', padding:10, font:{size:11}}}}}});
  }

  async function showChart() {
    const s = stockData[currentTicker];
    const info = WATCHLIST[currentTicker];
    if (!s && !info) return;
    document.getElementById('chartTitle').textContent = currentTicker.replace('.KS','').replace('.KQ','');
    document.getElementById('chartSubtitle').textContent = s?.name || info?.name || currentTicker;

    const chartData = await fetchChart(currentTicker, currentRange);
    if (!chartData) return;

    const ctx = document.getElementById('priceChart').getContext('2d');
    if (window._priceC) window._priceC.destroy();

    const pct = s?.pct ?? 0;
    const grad = ctx.createLinearGradient(0,0,0,280);
    if (pct >= 0) { grad.addColorStop(0,'rgba(34,197,94,0.25)'); grad.addColorStop(1,'rgba(34,197,94,0)'); }
    else { grad.addColorStop(0,'rgba(239,68,68,0.25)'); grad.addColorStop(1,'rgba(239,68,68,0)'); }

    window._priceC = new Chart(ctx, {type:'line', data:{labels:chartData.labels, datasets:[{data:chartData.prices, borderColor:pct>=0?'#22c55e':'#ef4444', backgroundColor:grad, fill:true, tension:0.3, pointRadius:0, pointHoverRadius:4, borderWidth:2}]}, options:{responsive:true, interaction:{mode:'index', intersect:false}, plugins:{legend:{display:false}, tooltip:{backgroundColor:'#1a1d27', titleColor:'#e1e5ea', bodyColor:'#e1e5ea', borderColor:'#2a2d3a', borderWidth:1, callbacks:{label:ctx2=>fmtPrice(currentTicker, ctx2.parsed.y)}}}, scales:{x:{grid:{color:'#2a2d3a'}, ticks:{color:'#9ca3af', maxTicksLimit:8}}, y:{grid:{color:'#2a2d3a'}, ticks:{color:'#9ca3af', callback:v=>fmtPrice(currentTicker,v)}}}}});
  }

  // Range buttons
  document.getElementById('chartRangeBtns').addEventListener('click', e => {
    const btn = e.target.closest('.range-btn');
    if (!btn) return;
    document.querySelectorAll('.range-btn').forEach(b => { b.className = b.className.replace(/bg-blue-600 text-white/g, 'bg-[#2a2d3a] text-gray-400'); });
    btn.className = btn.className.replace(/bg-\[\#2a2d3a\] text-gray-400/g, 'bg-blue-600 text-white');
    currentRange = btn.dataset.range;
    chartCache = {}; // clear cache for new range
    showChart();
  });

  // ── News ─────────────────────────────────────────────────
  async function fetchNews() {
    const url = `${CORS_PROXY}${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/news?q=stock+market&newsCount=6')}`;
    try {
      const resp = await fetch(url);
      const data = await resp.json();
      const items = data.news?.slice(0,6) || [];
      document.getElementById('newsGrid').innerHTML = items.map(n => {
        const time = new Date(n.publishedAt * 1000);
        const timeStr = time ? `${time.getMonth()+1}/${time.getDate()} ${time.getHours()}:${time.getMinutes().toString().padStart(2,'0')}` : '';
        return `<div class="card p-4 hover:border-[#3a3d4a] transition cursor-pointer"><div class="text-xs text-gray-500 mb-2">${n.publisher || ''} · ${timeStr}</div><div class="text-sm font-medium leading-snug">${n.title}</div></div>`;
      }).join('') || '<div class="text-gray-500 text-sm col-span-3">뉴스를 불러올 수 없습니다.</div>';
    } catch(e) {
      // Fallback: show generic message
      document.getElementById('newsGrid').innerHTML = '<div class="text-gray-500 text-sm col-span-3">뉴스를 불러올 수 없습니다.</div>';
    }
  }

  // ── Tabs ─────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => { b.className = b.className.replace(/tab-active/,'tab-inactive'); });
    btn.className = btn.className.replace(/tab-inactive/,'tab-active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
  }));

  // ── Search ───────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    const q = e.target.value.toUpperCase().replace('.KS','').replace('.KQ','');
    document.querySelectorAll('.stock-card').forEach(card => {
      const t = card.dataset.ticker;
      const displayT = t.replace('.KS','').replace('.KQ','');
      const s = stockData[t];
      card.style.display = (!q || displayT.includes(q) || (s && s.name && s.name.toUpperCase().includes(q))) ? '' : 'none';
    });
  });

  // ── Refresh ──────────────────────────────────────────────
  document.getElementById('refreshBtn').addEventListener('click', () => loadAll());

  // ── Main Load ────────────────────────────────────────────
  async function loadAll() {
    const now = new Date();
    document.getElementById('lastUpdate').textContent = '불러오는 중...';

    // Fetch indices and stock quotes in parallel
    const [idxData, stkData] = await Promise.all([
      fetchQuotes(Object.values(INDEX_SYMBOLS)),
      fetchQuotes(Object.keys(WATCHLIST)),
    ]);

    indexData = idxData;
    stockData = stkData;

    renderTicker();
    renderIndices();
    renderWatchlist();
    renderHoldings();
    renderSector();
    showChart();
    fetchNews(); // don't block on this

    document.getElementById('lastUpdate').textContent = `업데이트: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  }

  loadAll();
  </script>
</body>
</html>
